server:
  port: ${SERVER_PORT:8082}

catalog:
  base-url: ${CATALOG_BASE_URL:http://localhost:8081}

spring:
  application:
    name: pricing-service
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: pricing-service
      auto-offset-reset: earliest
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.modaprezzo.demo.pricing
        spring.json.value.default.type: com.modaprezzo.demo.pricing.ProductPublishedEvent

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
