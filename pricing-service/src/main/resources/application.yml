server:
  port: ${SERVER_PORT:8082}

catalog:
  base-url: ${CATALOG_BASE_URL:http://localhost:8081}

spring:
  application:
    name: pricing-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@localhost:1521/FREEPDB1}
    username: ${SPRING_DATASOURCE_USERNAME:pricing_app}
    password: ${SPRING_DATASOURCE_PASSWORD:pricing_app_dev_password}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: pricing-service
      auto-offset-reset: earliest
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.modaprezzo.demo.pricing
        spring.json.value.default.type: com.modaprezzo.demo.pricing.ProductPublishedEvent

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
