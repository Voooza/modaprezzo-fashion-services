asyncapi: 3.0.0
info:
  title: Pricing Service Events
  version: 0.1.0
  description: Events consumed and emitted by pricing-service.
channels:
  fashion.product.published.v1:
    address: fashion.product.published.v1
    messages:
      ProductPublished:
        $ref: "#/components/messages/ProductPublished"
  fashion.price.changed.v1:
    address: fashion.price.changed.v1
    messages:
      PriceChanged:
        $ref: "#/components/messages/PriceChanged"
operations:
  consumeProductPublished:
    action: receive
    channel:
      $ref: "#/channels/fashion.product.published.v1"
    messages:
      - $ref: "#/channels/fashion.product.published.v1/messages/ProductPublished"
  publishPriceChanged:
    action: send
    channel:
      $ref: "#/channels/fashion.price.changed.v1"
    messages:
      - $ref: "#/channels/fashion.price.changed.v1/messages/PriceChanged"
components:
  messages:
    ProductPublished:
      name: ProductPublished
      contentType: application/json
      payload:
        type: object
        required: [eventId, productId, styleNumber, collection, occurredAt]
        properties:
          eventId:
            type: string
          productId:
            type: string
          styleNumber:
            type: string
          collection:
            type: string
          occurredAt:
            type: string
            format: date-time
    PriceChanged:
      name: PriceChanged
      contentType: application/json
      payload:
        type: object
        required: [eventId, productId, market, currency, amount, occurredAt]
        properties:
          eventId:
            type: string
          productId:
            type: string
          market:
            type: string
          currency:
            type: string
          amount:
            type: number
          occurredAt:
            type: string
            format: date-time
