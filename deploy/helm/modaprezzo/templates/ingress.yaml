{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "modaprezzo.fullname" . }}
  labels:
    {{- include "modaprezzo.labels" . | nindent 4 }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "modaprezzo.fullname" . }}-assortment-ui-service
                port:
                  number: 8080
          - path: /api/products
            pathType: Prefix
            backend:
              service:
                name: {{ include "modaprezzo.fullname" . }}-catalog-service
                port:
                  number: 8081
          - path: /api/prices
            pathType: Prefix
            backend:
              service:
                name: {{ include "modaprezzo.fullname" . }}-pricing-service
                port:
                  number: 8082
{{- end }}
