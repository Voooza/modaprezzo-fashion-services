services:
  oracle-db:
    build: ./local/oracle
    image: modaprezzo-oracle-free:local
    environment:
      ORACLE_PASSWORD: modaprezzo_sys_dev_password
    ports:
      - "1521:1521"
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30

  kafka:
    image: apache/kafka:3.7.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"

  catalog-service:
    build: ./catalog-service
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle-db:1521/FREEPDB1
      SPRING_DATASOURCE_USERNAME: catalog_app
      SPRING_DATASOURCE_PASSWORD: catalog_app_dev_password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_started
      oracle-db:
        condition: service_healthy

  pricing-service:
    build: ./pricing-service
    environment:
      SERVER_PORT: 8082
      CATALOG_BASE_URL: http://catalog-service:8081
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle-db:1521/FREEPDB1
      SPRING_DATASOURCE_USERNAME: pricing_app
      SPRING_DATASOURCE_PASSWORD: pricing_app_dev_password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8082:8082"
    depends_on:
      kafka:
        condition: service_started
      oracle-db:
        condition: service_healthy
      catalog-service:
        condition: service_started

  assortment-ui-service:
    build: ./assortment-ui-service
    environment:
      SERVER_PORT: 8080
      CATALOG_BASE_URL: http://catalog-service:8081
      PRICING_BASE_URL: http://pricing-service:8082
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8080:8080"
    depends_on:
      catalog-service:
        condition: service_started
      pricing-service:
        condition: service_started
