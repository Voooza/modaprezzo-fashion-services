asyncapi: 3.0.0
info:
  title: Catalog Service Events
  version: 0.1.0
  description: Events emitted by catalog-service.
channels:
  fashion.product.published.v1:
    address: fashion.product.published.v1
    messages:
      ProductPublished:
        $ref: "#/components/messages/ProductPublished"
operations:
  publishProductPublished:
    action: send
    channel:
      $ref: "#/channels/fashion.product.published.v1"
    messages:
      - $ref: "#/channels/fashion.product.published.v1/messages/ProductPublished"
components:
  messages:
    ProductPublished:
      name: ProductPublished
      contentType: application/json
      payload:
        type: object
        required: [eventId, productId, styleNumber, collection, occurredAt]
        properties:
          eventId:
            type: string
          productId:
            type: string
          styleNumber:
            type: string
          collection:
            type: string
          occurredAt:
            type: string
            format: date-time
